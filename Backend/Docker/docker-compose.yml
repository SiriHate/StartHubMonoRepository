services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - monitoring

  user-service:
    image: starthub/userservice:1.0.0-SNAPSHOT
    container_name: user-service
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BOOTSTRAP_ADDRESS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - kafka
      - minio
    restart: unless-stopped
    networks:
      - monitoring

  notification-service:
    image: starthub/notificationservice:1.0.0-SNAPSHOT
    container_name: notification-service
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BOOTSTRAP_ADDRESS: kafka:29092
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8082:8082"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - monitoring

  main-service:
    image: starthub/mainservice:1.0.0-SNAPSHOT
    container_name: main-service
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/main_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - kafka
      - minio
    restart: unless-stopped
    networks:
      - monitoring

  chat-service:
    image: starthub/chatservice:1.0.0-SNAPSHOT
    container_name: chat-service
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chat_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      NOTIFICATION_SERVICE_URL: http://notification-service:8082/api/v1/notification_service/internal/chat-message
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - kafka
      - minio
      - notification-service
    restart: unless-stopped
    networks:
      - monitoring

  api-gateway:
    image: starthub/apigateway:0.0.1-SNAPSHOT
    container_name: api-gateway
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVICES_USER_SERVICE_URL: http://user-service:8081
      SERVICES_NOTIFICATION_SERVICE_URL: http://notification-service:8082
      SERVICES_MAIN_SERVICE_URL: http://main-service:8083
      SERVICES_CHAT_SERVICE_URL: http://chat-service:8084
      SERVICES_CHAT_SERVICE_WS_URL: ws://chat-service:8084
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - notification-service
      - main-service
      - chat-service
    restart: unless-stopped
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "472"
    ports:
      - "4000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - monitoring
    entrypoint: >
      sh -c "
        mkdir -p /etc/grafana/provisioning/datasources && \
        echo '
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus:9090
            isDefault: true
        ' > /etc/grafana/provisioning/datasources/datasource.yml && \
        /run.sh
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - kibana_data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - monitoring

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: logstash
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5000:5000"
      - "9600:9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - QUEUE_TYPE=persisted
    networks:
      - monitoring

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - monitoring

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - monitoring

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - monitoring

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../Certificates/cert.pem:/etc/nginx/certs/cert.pem:ro
      - ../Certificates/key.pem:/etc/nginx/certs/key.pem:ro
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  kibana_data:
  minio_data:

networks:
  monitoring:
    driver: bridge
